services:
    pokitoki:
        container_name: pokitoki
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
        extra_hosts:
            - "host.docker.internal:host-gateway"
            # - "REPLACE_WITH_YOUR_DOMAIN.COM:YOUR_PUBLIC_IP" # uncomment and replace the vars with your server HOSTNAME + IP if pokitoki is running on the same server
        volumes:
            - ./config.yml:/code/config.yml
            - data:/code/data

volumes:
    data:
